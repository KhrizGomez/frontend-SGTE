<main class="login-shell">
    <div class="paper-bg" aria-hidden="true"></div>

    <section class="login-wrapper" aria-label="Acceso al sistema">
        <article class="login-card">
            <header class="login-header">
                <h1>Bienvenido</h1>
                <p>Inicia sesión para continuar con tus trámites académicos.</p>
            </header>

            <form class="login-form" (ngSubmit)="iniciarSesion()">
                <label for="usuario">Usuario</label>
                <input id="usuario" type="text" name="usuario" placeholder="usuario@uteq.edu.ec"
                    class="form-control form-control-lg" [(ngModel)]="nombreUsuario" autocomplete="username" required />

                <label for="contrasena">Contraseña</label>
                <input id="contrasena" type="password" name="contrasena" placeholder="Contraseña"
                    class="form-control form-control-lg" [(ngModel)]="contrasena" autocomplete="current-password"
                    required />

                <button type="submit" class="btn btn-login" [disabled]="cargandoInicioSesion">
                    @if (cargandoInicioSesion) {
                    <span class="spinner-border spinner-border-sm me-2"></span>Ingresando...
                    } @else {
                    Iniciar sesión
                    }
                </button>

                <div class="divider" aria-hidden="true">
                    <span></span>
                    <small>o</small>
                    <span></span>
                </div>

                <button type="button" class="btn btn-register" (click)="abrirModalCreateAccount()">
                    Crear cuenta
                </button>

                <a href="#" class="forgot-link">¿Olvidaste tu contraseña?</a>
            </form>
        </article>

        <aside class="login-note" aria-label="Información del sistema">
            <div class="container-logo">
                <img ngSrc="/assets/logo.png" width="220" height="72" alt="UTEQ" class="brand-logo ms-auto" priority />
                <p>
                    El sistema mantiene una experiencia simple y enfocada para estudiantes, coordinación y decanato.
                </p>
            </div>
        </aside>
    </section>

    <!-- Modal de creacion de cuenta -->
    <div class="modal fade" id="modalCreateAccount" data-bs-backdrop="static" data-bs-keyboard="false" tabindex="-1"
        aria-labelledby="modalCreateAccountLabel">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content rounded-4">
                <div class="modal-header">
                    <h1 class="modal-title fs-5" id="modalCreateAccountLabel">Crear cuenta</h1>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <form>
                        <div class="form-check form-switch fs-5 mb-3">
                            <input class="form-check-input switch-giganterande my-2 mb-2" style="cursor: pointer;"
                                type="checkbox" role="switch" id="switchGrande" name="checkUsuarioExterno"
                                [(ngModel)]="estudianteExterno">
                            <label class="form-check-label m-0" for="checkCambio">Externo</label>
                        </div>

                        <div class="mb-3">
                            <input type="text" name="cedula" placeholder="Cedula"
                                class="form-control form-control-lg rounded-4" [(ngModel)]="cedula" required />
                        </div>

                        @if (estudianteExterno)
                        {
                        <div class="mb-3">
                            <input type="text" name="nombres" placeholder="Nombres"
                                class="form-control form-control-lg rounded-4" [(ngModel)]="nombres" required />
                        </div>

                        <div class="mb-3">
                            <input type="text" name="apellidos" placeholder="Apellidos"
                                class="form-control form-control-lg rounded-4" [(ngModel)]="apellidos" required />
                        </div>
                        }

                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cerrar</button>
                    <button type="button" class="btn btn-primary" (click)="registrarCuenta()"
                        [disabled]="cargandoRegistro">
                        @if (cargandoRegistro) {
                        <span class="spinner-border spinner-border-sm me-2"></span>Registrando...
                        } @else {
                        Registrar
                        }
                    </button>
                </div>
            </div>
        </div>
    </div>

</main>
