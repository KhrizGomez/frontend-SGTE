<main class="page d-flex justify-content-center align-items-center">
    <!-- Fondo -->
    <div class="bg position-absolute"></div>

    <!-- Formulario -->
    <section class="card card border-0 shadow-lg p-4">
        <!-- Logo -->
        <header class="logo mb-4">
            <img src="/assets/logo.png" alt="UTEQ" class="img-fluid" />
        </header>

        <form (ngSubmit)="iniciarSesion()">
            <div class="mb-3">
                <input type="text" name="usuario" placeholder="Usuario" class="form-control form-control-lg rounded-4"
                    [(ngModel)]="nombreUsuario" autocomplete="username" required />
            </div>

            <div class="mb-3">
                <input type="password" name="contrasena" placeholder="Contraseña"
                    class="form-control form-control-lg rounded-4" [(ngModel)]="contrasena"
                    autocomplete="current-password" required />
            </div>

            <button type="submit" class="btn btn-success btn-lg w-100 rounded-4 mb-2" [disabled]="cargandoInicioSesion">
                @if (cargandoInicioSesion) {
                <span class="spinner-border spinner-border-sm me-2"></span>Ingresando...
                } @else {
                Iniciar sesión
                }
            </button>

            <button type="button" class="btn btn-dark btn-lg w-100 rounded-4" (click)="abrirModalCreateAccount()">
                Crear cuenta
            </button>
        </form>

        <!-- Enlaces -->
        <div class="d-flex flex-column align-items-center my-4 mb-0">
            <a href="#" class="text-dark text-decoration-none small">
                ¿Olvidaste tu contraseña?
            </a>
        </div>
    </section>

    <!-- Modal de creacion de cuenta -->
    <div class="modal fade" id="modalCreateAccount" data-bs-backdrop="static" data-bs-keyboard="false" tabindex="-1"
        aria-labelledby="modalCreateAccountLabel">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content rounded-4">
                <div class="modal-header">
                    <h1 class="modal-title fs-5" id="modalCreateAccountLabel">Crear cuenta</h1>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <form>
                        <div class="form-check form-switch fs-5 mb-3">
                            <input class="form-check-input switch-giganterande my-2 mb-2" style="cursor: pointer;"
                                type="checkbox" role="switch" id="switchGrande" name="checkUsuarioExterno"
                                [(ngModel)]="estudianteExterno">
                            <label class="form-check-label m-0" for="checkCambio">Externo</label>
                        </div>

                        <div class="mb-3">
                            <input type="text" name="cedula" placeholder="Cedula"
                                class="form-control form-control-lg rounded-4" [(ngModel)]="cedula" required />
                        </div>

                        @if (estudianteExterno)
                        {
                        <div class="mb-3">
                            <input type="text" name="nombres" placeholder="Nombres"
                                class="form-control form-control-lg rounded-4" [(ngModel)]="nombres" required />
                        </div>

                        <div class="mb-3">
                            <input type="text" name="apellidos" placeholder="Apellidos"
                                class="form-control form-control-lg rounded-4" [(ngModel)]="apellidos" required />
                        </div>
                        }

                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cerrar</button>
                    <button type="button" class="btn btn-primary" (click)="registrarCuenta()"
                        [disabled]="cargandoRegistro">
                        @if (cargandoRegistro) {
                        <span class="spinner-border spinner-border-sm me-2"></span>Registrando...
                        } @else {
                        Registrar
                        }
                    </button>
                </div>
            </div>
        </div>
    </div>
    <div class="modal fade" id="modalMensaje" tabindex="-1" aria-labelledby="modalMensajeLabel" style="z-index: 1060;">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content rounded-4 border-0 shadow-lg">
                <div class="modal-header border-0 rounded-top-4" [ngClass]="esErrorMensaje ? 'bg-danger text-white' : 'bg-success text-white'">
                    <h1 class="modal-title fs-5" id="modalMensajeLabel">
                        <i class="bi me-2" [ngClass]="esErrorMensaje ? 'bi-exclamation-triangle-fill' : 'bi-check-circle-fill'"></i>
                        {{ mensajeTitulo }}
                    </h1>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body p-4">
                    <p class="mb-0 fs-5">{{ mensajeContenido }}</p>
                </div>
                <div class="modal-footer border-0">
                    <button type="button" class="btn" [ngClass]="esErrorMensaje ? 'btn-danger' : 'btn-success'" data-bs-dismiss="modal">Aceptar</button>
                </div>
            </div>
        </div>
    </div>

</main>
