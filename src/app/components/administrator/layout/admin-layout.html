<!-- admin-layout.html -->
<div class="layout-wrapper" [class.sidebar-collapsed]="!sidebarOpen">

    <!-- Sidebar -->
    <aside class="sidebar sidebar--admin">
        <div class="sidebar__brand">
            <i class="bi bi-shield-shaded brand-icon"></i>
            <span class="brand-text">SGTE <small>Admin</small></span>
        </div>

        <nav class="sidebar__nav">
            <ul class="nav-list">
                <li *ngFor="let item of navItems" class="nav-list__item">
                    <a [routerLink]="item.route" routerLinkActive="active" class="nav-link">
                        <i class="bi {{ item.icon }}"></i>
                        <span class="nav-label">{{ item.label }}</span>
                    </a>
                </li>
            </ul>
        </nav>

        <div class="sidebar__footer">
            <button class="btn-logout" (click)="logout()">
                <i class="bi bi-box-arrow-left"></i>
                <span>Cerrar sesión</span>
            </button>
        </div>
    </aside>

    <!-- Main content -->
    <div class="main-wrapper">

        <!-- Top navbar -->
        <header class="topbar">
            <button class="topbar__toggle" (click)="toggleSidebar()" title="Colapsar menú">
                <i class="bi bi-list"></i>
            </button>

            <div class="topbar__breadcrumb">
                <span class="breadcrumb-role">Panel Administrador</span>
            </div>

            <div class="topbar__user">
                <i class="bi bi-person-circle"></i>
                <span>{{ currentUser }}</span>
            </div>
        </header>

        <!-- Page content -->
        <main class="page-content">
            <router-outlet></router-outlet>
        </main>
    </div>
</div>
