                <option>Académicos y de Carga Horaria</option>

                <option>Titulación y Graduación</option>
                <option>Financieros y de Beneficios</option>
              </select>
            </label>
            <label class="field field--inline">
              <span class="label">Prioridad</span>
              <select id="co-fil-prio" class="select">
                <option value="">Todas</option>
                <option>Baja</option>
                <option>Media</option>
                <option>Alta</option>
                <option>Urgente</option>
              </select>
            </label>
            <label class="field field--inline">
              <span class="label">Estado</span>

                <option>En revisión</option>
                <option>Finalizado</option>

        <!-- Modal crear/editar trámite -->
        <div id="co-modal" class="modal" hidden>
          <div class="modal__backdrop" data-close="1"></div>
          <div class="modal__dialog" role="dialog" aria-modal="true" aria-labelledby="co-modal-title">
            <div class="modal__header">
              <h3 id="co-modal-title">Trámite</h3>
              <button id="co-close" class="btn-ghost" type="button"><i class="bi bi-x-lg"></i></button>
            </div>
            <div class="modal__body">
              <form id="co-form" class="form-grid" autocomplete="off">
                <input type="hidden" id="co-id" />
                <label class="field field--col-2">
                  <span class="label">Título del trámite</span>
                  <input id="co-titulo" class="select" placeholder="Ej. Homologación de materias" required />
                </label>
                <label class="field">
                  <span class="label">Categoría de trámite</span>
                  <select id="co-tipo" class="select" required>
                    <option value="">Seleccione una opción</option>
                    <option>Admisión y Matrícula</option>
                    <option>Académicos y de Carga Horaria</option>
                    <option>Certificación y Documentos</option>
                    <option>Titulación y Graduación</option>
                    <option>Financieros y de Beneficios</option>
                  </select>
                </label>
                <label class="field">
                  <span class="label">Prioridad</span>
                  <select id="co-prioridad" class="select">
                    <option>Baja</option>
                    <option>Media</option>
                    <option>Alta</option>
                    <option>Urgente</option>
                  </select>
                </label>
                <label class="field">
                  <span class="label">Estado</span>
                  <select id="co-estado" class="select">
                    <option>Borrador</option>
                    <option>Publicado</option>
                    <option>En revisión</option>
                    <option>Finalizado</option>
                  </select>
                </label>
                
                <label class="field">
                  <span class="label">Fecha límite</span>
                  <input id="co-fecha" class="select" type="date" />
                </label>
                <label class="field field--col-2">
                  <span class="label">Descripción</span>
                  <textarea id="co-desc" class="textarea" placeholder="Detalles y requisitos"></textarea>
                </label>

                <div class="field field--col-2">
                  <span class="label">Trazabilidad (flujo)</span>
                  <div class="traza-grid">
                    <select id="co-traza" class="select">
                      <option value="basico">Recepción → Revisión → Aprobación → Notificación → Finalizado</option>
                      <option value="validacion">Recepción → Validación documental → Revisión coordinación → Aprobación decanato → Finalizado</option>
                      <option value="homologacion">Recepción → Evaluación de homologación → Resolución → Notificación → Finalizado</option>
                      <option value="personalizada">Personalizada…</option>
                    </select>
                    <div id="co-traza-preview">
                      <ol class="timeline timeline--v" id="co-tl" aria-label="Vista previa de la trazabilidad"></ol>
                    </div>
                  </div>
                </div>

                <div id="co-custom" class="custom-flow" hidden>
                  <div class="custom-flow__row">
                    <input id="co-step-name" class="select" placeholder="Nombre de la etapa (Ej. Revisión de documentos)" />
                    <select id="co-step-role" class="select" aria-label="Rol responsable de la etapa">
                      <option value="Coordinador">Coordinador</option>
                      <option value="Decano">Decano</option>
                    </select>
                    <button id="co-step-add" class="btn-primary" type="button">Añadir etapa</button>
                  </div>
                  <ul id="co-steps" class="steps-list" aria-label="Lista de etapas personalizadas"></ul>
                </div>

                <div class="form-actions field--col-2">
                  <button id="co-cancelar" type="button" class="btn-ghost">Cancelar</button>
                  <button id="co-guardar" type="submit" class="btn-primary">Guardar</button>
                </div>
              </form>
            </div>
          </div>
        </div>
